<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You — TPD Chaplains Corps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Source Serif 4',Georgia,serif;background:#0d1b2a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem}
.card{background:#fff;max-width:480px;width:100%;padding:3rem;text-align:center}

a{display:inline-block;background:#0d1b2a;color:#fff;font-family:'Oswald',sans-serif;font-size:12px;letter-spacing:.14em;text-transform:uppercase;padding:12px 28px;text-decoration:none}

</head>
<body>
<div class="card">
  <div class="badge">
    <svg viewBox="0 0 24 24"><path d="M12 2L9.5 7H4l4.2 3.1-1.6 5.1L12 12.2l5.4 3-1.6-5.1L20 7h-5.5z"/></svg>
